<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#080C14"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.8"/>
  <circle cx="16" cy="16" r="9"  fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.3"/>
  <!-- Hour marks -->
  <line x1="16" y1="5"  x2="16" y2="7"  stroke="#D4A843" stroke-width="1.5"/>
  <line x1="16" y1="25" x2="16" y2="27" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="5"  y1="16" x2="7"  y2="16" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="25" y1="16" x2="27" y2="16" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Minute hand -->
  <line x1="16" y1="16" x2="16" y2="8"  stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second hand (pointing to 2 o'clock) -->
  <line x1="16" y1="16" x2="21" y2="10" stroke="#3B82F6" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="1.5" fill="#D4A843"/>
</svg>
